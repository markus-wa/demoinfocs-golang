message CMsgSource2PerfIntervalSample {
	message Tag {
		optional string tag = 1;
		optional uint32 max_value = 2;
	}

	optional float frame_time_max_ms = 1;
	optional float frame_time_avg_ms = 2;
	optional float frame_time_min_ms = 3;
	optional int32 frame_count = 4;
	optional float frame_time_total_ms = 5;
	repeated .CMsgSource2PerfIntervalSample.Tag tags = 6;
}

message CSource2Metrics_MatchPerfSummary_Notification {
	message Client {
		optional .CMsgSource2SystemSpecs system_specs = 1;
		optional .CMsgSource2VProfLiteReport profile = 2;
		optional uint32 build_id = 3;
		optional .CMsgSource2NetworkFlowQuality downstream_flow = 4;
		optional .CMsgSource2NetworkFlowQuality upstream_flow = 5;
		optional fixed64 steamid = 10;
		repeated .CMsgSource2PerfIntervalSample perf_samples = 11;
	}

	optional uint32 appid = 1;
	optional string game_mode = 2;
	optional uint32 server_build_id = 3;
	optional fixed32 server_popid = 4;
	optional .CMsgSource2VProfLiteReport server_profile = 10;
	repeated .CSource2Metrics_MatchPerfSummary_Notification.Client clients = 11;
	optional string map = 20;
}

message CMsgSource2PlayStatsPackedRecordList {
	message FieldDef {
		optional string field_name = 1;
		optional .ESource2PlayStatsFieldType field_type = 2 [default = Source2PlayStats_Invalid];
	}

	optional string record_name = 1;
	repeated .CMsgSource2PlayStatsPackedRecordList.FieldDef field_defs = 2;
	optional uint32 record_count = 3;
	repeated uint64 uint64_vals = 4 [packed = true];
	repeated uint32 uint32_vals = 5 [packed = true];
	repeated uint32 uint16_vals = 6 [packed = true];
	repeated uint32 uint8_vals = 7 [packed = true];
	repeated int64 int64_vals = 8 [packed = true];
	repeated int32 int32_vals = 9 [packed = true];
	repeated int32 int16_vals = 10 [packed = true];
	repeated int32 int8_vals = 11 [packed = true];
	repeated double float64_vals = 12 [packed = true];
	repeated float float32_vals = 13 [packed = true];
	repeated bool bool_vals = 14 [packed = true];
	repeated string string_vals = 15;
	repeated string low_cardinality_string_vals = 16;
	repeated fixed32 utcdatetime_vals = 17 [packed = true];
}

message CSource2Metrics_RecordPlayStats_Notification {
	repeated .CMsgSource2PlayStatsPackedRecordList record_types = 1;
	optional uint32 appid = 2;
}

message CSource2Metrics_FetchMapData_Request {
	optional uint32 appid = 1;
	optional string map_name = 2;
	optional uint32 game_type = 3;
	optional uint32 game_mode = 4;
	optional string param = 5;
	optional uint32 time_span = 6;
}

message CSource2Metrics_FetchMapData_Response {
	message MapData {
		optional string name = 1;
		optional string type = 2;
		optional string data = 3;
	}

	repeated .CSource2Metrics_FetchMapData_Response.MapData results = 1;
}
